# run automatically when a tag is created by the release.yml workflow
version: 2

# TODO replace with a `go mod tidy -check` when go is upgraded
before:
  hooks:
    - go mod tidy

builds:
  - id: cli
    main: ./cmd/cli
    binary: seapack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-v{{ .Version }}-
      {{- if eq .Arch "amd64" }}x86_64-unknown-linux-musl
      {{- else if eq .Arch "arm64" }}arm64-unknown-linux-musl
      {{- else }}{{ .Arch }}-{{ .Os }}{{ end }}

# build a multi-arch seapack frontend image to be used by buildkit to convert a repo (and any seapack.json) into docker llb
# the seapack build and runtime images are created separately. This image bundles the freshly compiled seapack binary
# which is why we build the images here instead of GHA.
dockers:
  - image_templates:
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:{{ .Tag }}-amd64"
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:latest-amd64"
    use: buildx
    goarch: amd64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
    dockerfile: images/alpine/frontend/goreleaser.Dockerfile
  - image_templates:
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:{{ .Tag }}-arm64"
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:latest-arm64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
    goarch: arm64
    dockerfile: images/alpine/frontend/goreleaser.Dockerfile

docker_manifests:
  - name_template: "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:{{ .Tag }}"
    image_templates:
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:{{ .Tag }}-amd64"
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:{{ .Tag }}-arm64"
  - name_template: "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:latest"
    image_templates:
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:latest-amd64"
      - "{{ .Env.PRODUCTION_FRONTEND_IMAGE_NAME }}:latest-arm64"

changelog:
  use: github-native

checksum:
  name_template: 'checksums.txt'

release:
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  include_meta: true
